apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: redis
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 22.0.7

    helm:
      values: |
        architecture: standalone

        auth:
          enabled: false

        master:
          persistence:
            enabled: true
            storageClass: nfs-client
            size: 2Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: database

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

