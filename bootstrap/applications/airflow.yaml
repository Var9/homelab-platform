apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: airflow
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.18.0

    helm:
      values: |
        executor: CeleryExecutor

        postgresql:
          enabled: false

        redis:
          enabled: false

        data:
          metadataSecretName: airflow-metadata-secret
          brokerUrlSecretName: airflow-broker-secret

        fernetKeySecretName: airflow-fernet-secret

        webserverSecretKeySecretName: airflow-webserver-secret

        dags:
          persistence:
            enabled: false

          gitSync:
            enabled: true
            repo: https://github.com/Var9/airflow-dags.git
            branch: main
            rev: HEAD


        logs:
          persistence:
            enabled: true
            storageClassName: nfs-client
            size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
