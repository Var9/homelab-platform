apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 77.12.0

    helm:
      values: |
        grafana:
          enabled: true

          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.datastoragevault.co.in
            path: /

        prometheus-node-exporter:
          nodeSelector:
            node-role.kubernetes.io/worker: ""

        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.datastoragevault.co.in
            paths:
              - /
            pathType: Prefix

          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-client
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi

        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-client
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
