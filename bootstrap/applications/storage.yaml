apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: storage
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Var9/homelab-platform.git
    targetRevision: main
    path: infrastructure/storage

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
