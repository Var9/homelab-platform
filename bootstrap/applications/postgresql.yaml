apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: postgresql
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 18.7.11

    helm:
      values: |
        auth:
          postgresPassword: postgres
          username: airflow
          password: airflow
          database: airflow

        primary:
          persistence:
            enabled: true
            storageClass: nfs-client
            size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: database

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
