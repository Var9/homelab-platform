apiVersion: argoproj.io/v1al
pha1
kind: Application

metadata:
  name: airflow
  namespace: argocd

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow

  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.18.0

    helm:
      releaseName: airflow
      valueFiles:
        - values.yaml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
