executor: CeleryExecutor

defaultAirflowTag: "3.2.2"

postgresql:
  enabled: false

redis:
  enabled: false

data:
  metadataSecretName: airflow-metadata-secret
  brokerUrlSecretName: airflow-broker-secret

fernetKeySecretName: airflow-fernet-secret

webserverSecretKeySecretName: airflow-webserver-secret

apiSecretKeySecretName: airflow-api-secret-key

jwtSecretKeySecretName: airflow-jwt-secret

ingress:
  apiServer:
    enabled: true
    ingressClassName: nginx
    path: "/"
    pathType: Prefix
    hosts:
      - name: airflow.datastoragevault.co.in

createUserJob:
  useHelmHooks: false

migrateDatabaseJob:
  useHelmHooks: false

dagProcessor:
  enabled: true

scheduler:
  replicas: 1

triggerer:
  enabled: true

workers:
  replicas: 1

dags:
  persistence:
    enabled: false

  gitSync:
    enabled: true

    repo: git@github.com:Var9/airflow-dags.git

    branch: main

    rev: HEAD

    sshKeySecret: airflow-git-ssh

logs:
  persistence:
    enabled: true

    storageClassName: nfs-client

    size: 10Gi
